front:
  text: 笑堂和尚語録序天童諸法席函蓋乾坤縱橫中外矣有如弘覺木老和尚蒙我世祖章皇帝之召對也奚翅彩鳳祥麟儀廷光國屈指同門共拂如林野老人實比肩伯仲惜蚤以隻履還西未遑隆禮爰悉林老所付囑計五十人旃林自罕雜卉師窟寧産凡兒然求其韞玉韜鋒單拈最上孤光絶響丕紹淵源接祖禰裕弓冶推正系者非笑堂師其疇與歸師為名家子具夙慧根向父母未生前先形兆異既果猛脫愛河死灰參契解粘釋縛錚錚烈丈夫五濁詎可多得隨侍老人多閲年所疑關畏壘夾輔交攻巾瓶罔怠以故鉗鎚獨辣於師手眼每過於衆試繹老人寄贈秋懷一章則知其印可最先而年年針線都作嫁衣伐鼓鏗金揶揄頓解正如貞士潛修匪汲汲於功名富貴然瓜熟渠成不堪埋沒擎拳豎指證明推出廣化門庭一鳴再鼓抑何雄也嗣是應杯渡應三聚復隆廣化全機大用蹈古高風寓內嚮慕不下景星鄉雲豫里居邇金粟親覲不遙過包山靜室喜接霞起晙公蒸雲隱霧擲釣探珠覿面全彰度越儕等及觀其所劂臥龍一臠實為笑堂賢法嗣夫笑老現據廣化豈今者固無法可說乃以十載前向上接人之草料令子代為拈出壽梓流通亦可謂不愧家風克宣世媺至于刊華就實以簡馭繁達祖單傳不存知解滹沱棒喝盡斬葛藤縱云一物全無業已和盤托出千尋高嶂至嶽而止萬派洪濤迄海而消具眼者共見豫又何言哉因善霞公述為序時康熙乙巳壯月穀旦督理湖廣糧儲布政使司右參政前刑部廣西清吏司郎中恤刑山東遼鎮等處地方陳之伸頓首拜撰敘粵自拈華微笑後老鬍特地西來派衍臨濟宗風獨推天童盛化燈聯不墜金器博傳奪食驅耕星飛電捲或嘯傲林泉縱橫宇宙群狸魔干能不潛形滅跡也茲惟笑堂和尚乃通圓奇之真子天童悟之嫡孫不禁被蓋囊藏遽爾龍天推出應杯渡三聚露爪張牙施為逆順主禹航廣化拏雲攫霧隱顯隨時登曲彔木於開口處屏卻唇吻隨波逐浪突出祖師巴鼻踞方丈室向文字中不立文字截斷衆流豁開末學胸襟言言見諦點點歸源豈比尖新妙句繪水鏤空輩同日而語邪其高足霞起大師隱靜包山禪室鋤雲喝石不欲露布旃林獅窟固無異物亦呵佛詈祖之種草也遞聞弘覺老人每加歎賞豫適外氏董晤凌生萬宗兩內兄得睹霞師所繕刻有陳大參敘之詳矣豫愧呫嗶家風未譯西來祖意且向毫端上流出一道語言三昧拋穢佛頭大似罪過倘遇知音拍掌豫將擲筆起云霞公覓序已竟時康熙乙巳桂秋古鹽官曹林韻沐手拜題
